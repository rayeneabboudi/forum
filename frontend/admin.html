<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROTOCOL | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .header { border-bottom: 2px solid #2D4BFF; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 5px; text-align: center; }
        .stat-card h3 { color: #2D4BFF; margin: 0; font-size: 12px; }
        .stat-card p { font-size: 24px; margin: 10px 0 0; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: #0a0a0a; }
        th { background: #111; color: #2D4BFF; text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
        
        .trust-low { color: #ff4d4d; font-weight: bold; }
        .trust-clean { color: #00ff00; }
        
        /* Action Buttons */
        .btn-view { background: #2D4BFF; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-left: 5px; }
        
        /* Security Overlay */
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction: column; align-items:center; justify-content:center; }
        #auth-overlay input { padding: 10px; width: 300px; background: #111; border: 1px solid #2D4BFF; color: #00ff00; text-align: center; font-family: monospace; outline: none; }
        
        /* Inspector Modal */
        #inspector-modal { display: none; position: fixed; top: 50px; left: 50%; transform: translateX(-50%); width: 80%; max-height: 80vh; background: #111; border: 2px solid #2D4BFF; z-index: 1000; padding: 20px; overflow-y: auto; box-shadow: 0 0 30px rgba(45, 75, 255, 0.3); }
        #inspector-modal pre { color: #00ff00; white-space: pre-wrap; font-size: 12px; }
        .close-btn { float: right; background: #ff4d4d; color: #fff; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h3 style="color: #2D4BFF; letter-spacing: 2px;">AUTHORIZATION REQUIRED</h3>
    <input type="password" id="admin-pass" placeholder="ENTER ARCHITECT KEY & PRESS ENTER">
</div>

<div id="inspector-modal">
    <button class="close-btn" onclick="document.getElementById('inspector-modal').style.display='none'">CLOSE X</button>
    <h2 style="color: #2D4BFF; margin-top: 0;">DOSSIER INSPECTION</h2>
    <pre id="json-viewer">Loading forensics...</pre>
</div>

<div class="header">
    <div>
        <h1 style="margin: 0; letter-spacing: 2px;">PROTOCOL COMMAND CENTER</h1>
        <span style="color: #666; font-size: 12px;">SYSTEM ARCHITECT: ALGERIA NODE</span>
    </div>
    <p id="clock" style="color: #00ff00; font-weight: bold;"></p>
</div>

<div class="stats-bar">
    <div class="stat-card"><h3>TOTAL DOSSIERS</h3><p id="stat-total">0</p></div>
    <div class="stat-card"><h3>LOW TRUST FLAG</h3><p id="stat-flagged" style="color: #ff4d4d;">0</p></div>
    <div class="stat-card"><h3>SYSTEM STATUS</h3><p style="color: #00ff00;">ONLINE / SECURE</p></div>
</div>

<table id="dossier-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>APPLICANT</th>
            <th>INTEGRITY</th>
            <th>TAB SWITCHES</th>
            <th>SUBMITTED</th>
            <th>ACTIONS</th>
        </tr>
    </thead>
    <tbody id="table-body">
        </tbody>
</table>

<script>
    // --- 1. FIREBASE LINK (DO NOT CHANGE) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCmBPzrnmMjI68taFD5c33HSojNyRjmVEk",
        authDomain: "protocol-v.firebaseapp.com",
        projectId: "protocol-v",
        storageBucket: "protocol-v.firebasestorage.app",
        messagingSenderId: "416989975671",
        appId: "1:416989975671:web:2c9d4478995e7f91d12272"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. AUTHENTICATION ---
    document.getElementById('admin-pass').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            if(e.target.value === 'ghalirayene33') { // <-- CHANGE 'admin123' TO YOUR SECRET PASSWORD
                document.getElementById('auth-overlay').style.display = 'none';
                loadData();
            } else {
                alert("ACCESS DENIED: UNAUTHORIZED USER DETECTED.");
                e.target.value = '';
            }
        }
    });

    // --- 3. FETCH AND DISPLAY DATA ---
    async function loadData() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>DECRYPTING DATABASE...</td></tr>";
        
        const snapshot = await db.collection("applicants").orderBy("doc_meta.submitted", "desc").get();
        tbody.innerHTML = ""; // Clear loading message
        
        let total = 0; let flagged = 0;

        snapshot.forEach(doc => {
            const data = doc.data();
            total++;
            
            const integrity = data.security_audit?.integrity_score || "UNKNOWN";
            const isLow = integrity === "LOW_TRUST";
            if(isLow) flagged++;

            const row = `
                <tr>
                    <td style="color: #666;">${doc.id.substring(0, 8)}...</td>
                    <td style="font-weight: bold;">${data.doc_meta?.name || 'Unknown'}</td>
                    <td class="${isLow ? 'trust-low' : 'trust-clean'}">${integrity}</td>
                    <td>${data.behavioral_forensics?.session?.tab_switches || 0}</td>
                    <td>${new Date(data.doc_meta?.submitted).toLocaleString()}</td>
                    <td>
                        <button class="btn-view" onclick="inspectDoc('${doc.id}')">INSPECT</button>
                        <button class="btn-delete" onclick="deleteDoc('${doc.id}')">PURGE</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-flagged').innerText = flagged;
    }

    // --- 4. THE INSPECTOR (VIEWS THE FULL JSON) ---
    async function inspectDoc(docId) {
        document.getElementById('inspector-modal').style.display = 'block';
        document.getElementById('json-viewer').innerText = "Retrieving forensics...";
        
        const doc = await db.collection("applicants").doc(docId).get();
        if (doc.exists) {
            // Converts the data to a beautiful, readable format
            const formattedJSON = JSON.stringify(doc.data(), null, 4);
            document.getElementById('json-viewer').innerText = formattedJSON;
        } else {
            document.getElementById('json-viewer').innerText = "FILE CORRUPTED OR MISSING.";
        }
    }

    // --- 5. THE PURGE BUTTON (DELETES SPAM) ---
    async function deleteDoc(docId) {
        if (confirm("WARNING: Are you sure you want to permanently PURGE this dossier?")) {
            await db.collection("applicants").doc(docId).delete();
            alert("Dossier Purged.");
            loadData(); // Reload the table instantly
        }
    }

    // Live Clock Update
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
